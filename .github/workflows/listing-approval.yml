name: Honeycomb listing approval

on:
  workflow_dispatch:
    inputs:
      pull_request:
        description: Package pull request (open, or merged for repository-owner publication)
        required: true
        type: string
      head_sha:
        description: Exact reviewed pull-request head SHA
        required: true
        type: string
      lint_run_id:
        description: Exact reviewed Security lint workflow run ID
        required: true
        type: string
      name:
        description: Honeycomb name
        required: true
        type: string
      version:
        description: Honeycomb version
        required: true
        type: string
      release_sha256:
        description: Exact release fingerprint from lint evidence
        required: true
        type: string
      evidence_digest:
        description: Exact reviewed lint evidence digest
        required: true
        type: string
      review_id:
        description: Current PR review ID for independent authority; leave empty for repository owner
        required: false
        default: ""
        type: string
      publication_authority:
        description: Independent review or explicit first-party repository-owner publication
        required: true
        type: choice
        options: [independent, repository_owner]
      owner_acknowledgement:
        description: "For repository_owner, enter exactly: I accept first-party publication responsibility"
        required: false
        default: ""
        type: string
      decision:
        description: Listing decision
        required: true
        type: choice
        options: [approved, denied]
      notes:
        description: Audit notes
        required: true
        type: string
      approved_suppressions:
        description: JSON array of exact approved finding fingerprints
        required: true
        default: "[]"
        type: string

permissions:
  actions: read
  contents: write
  pull-requests: read
  issues: write
  statuses: write

concurrency:
  group: honeycomb-listing-approval
  cancel-in-progress: false

jobs:
  issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: honeycomb-listing-approval
    steps:
      - name: Check out trusted approval issuer
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Append exact-SHA listing evidence
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          DEFAULT_BRANCH_SHA="$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD)" \
            ruby script/honeycomb-listing-approval issue --event "$GITHUB_EVENT_PATH" --root "$GITHUB_WORKSPACE"
