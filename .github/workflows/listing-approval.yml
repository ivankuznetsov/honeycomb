name: Honeycomb listing approval

on:
  workflow_dispatch:
    inputs:
      pull_request:
        description: Open pull-request number
        required: true
        type: string
      head_sha:
        description: Exact reviewed pull-request head SHA
        required: true
        type: string
      lint_run_id:
        description: Passing Security lint workflow run ID
        required: true
        type: string
      name:
        description: Honeycomb name
        required: true
        type: string
      version:
        description: Honeycomb version
        required: true
        type: string
      release_sha256:
        description: Exact release fingerprint from lint evidence
        required: true
        type: string
      evidence_digest:
        description: Exact reviewed lint evidence digest
        required: true
        type: string
      review_id:
        description: Current pull-request review ID from the dispatching maintainer
        required: true
        type: string
      decision:
        description: Listing decision
        required: true
        type: choice
        options: [approved, denied]
      notes:
        description: Audit notes
        required: true
        type: string
      approved_suppressions:
        description: JSON array of exact approved finding fingerprints
        required: true
        default: "[]"
        type: string

permissions:
  actions: read
  contents: write
  pull-requests: read
  statuses: read

concurrency:
  group: honeycomb-listing-approval
  cancel-in-progress: false

jobs:
  issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: honeycomb-listing-approval
    steps:
      - name: Check out trusted approval issuer
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Append exact-SHA listing evidence
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ruby script/honeycomb-listing-approval issue --event "$GITHUB_EVENT_PATH" --root "$GITHUB_WORKSPACE"
