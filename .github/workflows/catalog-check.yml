name: Catalog publication

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: catalog-publication-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out registry source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          path: source
          fetch-depth: 0
          persist-credentials: false

      - name: Check out compatible Hive source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: ivankuznetsov/hive
          ref: af22485f9b2bee27a7497dc138e5e58ab9725bde
          path: hive
          persist-credentials: false

      - name: Check out protected listing evidence
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: honeycomb-evidence
          path: evidence
          persist-credentials: false

      - name: Verify source contracts
        working-directory: source
        env:
          HONEYCOMB_HIVE_SOURCE: ${{ github.workspace }}/hive
          RUBYLIB: ${{ github.workspace }}/hive/lib
        run: ruby test/run.rb

      - name: Verify canonical catalog against protected evidence
        working-directory: source
        run: >-
          ruby script/honeycomb-catalog --check
          --evidence ../evidence/normalized/listing-evidence-v1.json
