name: Security lint report

on:
  workflow_run:
    workflows: ["Security lint"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write
  statuses: write

concurrency:
  group: security-lint-report-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  report:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out trusted reporter
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Publish SHA-bound security lint evidence
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ruby script/honeycomb-security-lint-report --event "$GITHUB_EVENT_PATH" --root "$GITHUB_WORKSPACE"
